<textarea
    name="{{ widget.name }}"
    id="{{ widget.attrs.id }}_textarea"
    autocomplete="off"
    {% include "django/forms/widgets/attrs.html" %}
>{{ widget.value }}</textarea>

<script>
/* -------------------------------
   TinyMCE initialisation helpers
-------------------------------- */

function setup_tiny_{{ widget.attrs.id }}() {
    const id = '{{ widget.attrs.id }}_textarea';

    // already initialised
    if (tinymce.get(id)) {
        return;
    }

    const el = document.getElementById(id);

    // element not present or not visible yet
    if (!el || el.offsetParent === null) {
        return;
    }

    tinymce.init({
        selector: '#' + id,
        height: {{ height }},
        menubar: false,
        branding: false,
        content_css: [
            '//fonts.googleapis.com/css?family=Lato:300,300i,400,400i'
        ],

        {% if disabled %}
        readonly: 1,
        toolbar: '',
        {% else %}
        forced_root_block: '',
        force_br_newlines: true,
        force_p_newlines: false,
        convert_newlines_to_brs: true,
        cleanup: false,
        plugins: ['searchreplace', 'code'],
        toolbar: 'bold italic | bullist numlist | ifgen{% if save_include_url %} saveinclude{% endif %} | standardparagraphbutton',
        setup: function (editor) {
            data_merge_add_if_button(editor);
            {% if save_include_url %}
            data_merge_add_save_include_button(editor, '{{ save_include_url }}');
            {% endif %}
        },
        init_instance_callback: function (editor) {
            django_modal.send_inputs({
                ajax: 'get_{{ widget.name }}_data_merge_menu',
                field_auto_id: '{{ widget.attrs.id }}'
            });
        }
        {% endif %}
    });
}

function reset_{{ widget.attrs.id }}() {
    const id = '{{ widget.attrs.id }}_textarea';

    if (tinymce.get(id)) {
        tinymce.remove('#' + id);
    }

    setup_tiny_{{ widget.attrs.id }}();
}

/* ---------------------------------------
   Retry until visible (modal / HTMX safe)
---------------------------------------- */

function init_tiny_when_visible_{{ widget.attrs.id }}(attempts) {
    attempts = attempts || 0;

    reset_{{ widget.attrs.id }}();

    if (!tinymce.get('{{ widget.attrs.id }}_textarea') && attempts < 20) {
        setTimeout(function () {
            init_tiny_when_visible_{{ widget.attrs.id }}(attempts + 1);
        }, 100);
    }
}

/* ---------------------------------------
   Menu building helpers
---------------------------------------- */

function build_menu(editor, menu_data) {
    $.each(menu_data, function (index, menu) {
        if ('menu' in menu) {
            build_menu(editor, menu['menu']);
        } else {
            menu.onclick = function () {
                if ('raw' in menu && menu.raw) {
                    editor.insertContent(menu.code);
                } else if ('include' in menu && menu.include) {
                    editor.insertContent('[{ ' + menu.code + ' }]');
                } else {
                    editor.insertContent('{ ' + menu.code + ' }');
                }
            };
        }
    });
    return menu_data;
}

/* ---------------------------------------
   Data merge menu callback
---------------------------------------- */

ajax_helpers.command_functions.build_data_merge_menu_{{ widget.attrs.id }} = function (command) {
    var editor = tinymce.get('{{ widget.attrs.id }}_textarea');
    if (!editor) return;

    var menus = jQuery.parseJSON(command.data);

    $.each(menus, function (index, menu) {
        var menu_data = build_menu(editor, menu.menu);

        editor.addButton(menu.code, {
            type: 'menubutton',
            text: menu.text,
            icon: false,
            menu: menu_data
        });

        var button = editor.buttons[menu.code];
        var bg = editor.theme.panel.find('toolbar buttongroup')[0];

        bg._lastRepaintRect = bg._layoutRect;
        bg.append(button);
    });
};

/* ---------------------------------------
   If-Statement Generator
---------------------------------------- */

function data_merge_build_if_statement(d) {
    var tag = (d.tag || '').trim();
    if (tag) {
        if (tag.charAt(0) !== '{') {
            tag = '{ ' + tag + ' }';
        }
    } else {
        tag = '{  }';
    }
    var open = '', close = '';
    if (d.bold) { open += '<strong>'; close = '</strong>' + close; }
    if (d.italic) { open += '<em>'; close = '</em>' + close; }
    if (d.underline) { open += '<span style="text-decoration: underline;">'; close = '</span>' + close; }
    var pre = d.pre_text || '';
    var post = d.post_text || '';
    var notf = d.not_flag ? '?' : '';
    var inner;
    if (d.show_tag) {
        inner = pre + ' ' + open + tag + notf + close + ' ' + post;
    } else {
        // The tag value is hidden, so styling it is meaningless.
        inner = pre + ' !' + tag + notf + ' ' + post;
    }
    // Split the delimiters so Django's template lexer doesn't parse them as a block tag.
    return '{' + '% ' + inner + ' %' + '}';
}

function data_merge_add_if_button(editor) {
    editor.addButton('ifgen', {
        text: 'If',
        tooltip: 'Insert a conditional (if) statement',
        onclick: function () {
            var selection = editor.selection.getContent({ format: 'text' }) || '';
            editor.windowManager.open({
                title: 'If Statement Generator',
                width: 480,
                height: 340,
                body: [
                    { type: 'textbox', name: 'pre_text', label: 'Before text' },
                    { type: 'textbox', name: 'tag', label: 'Tag', value: selection },
                    { type: 'checkbox', name: 'show_tag', label: 'Show tag result', checked: true },
                    { type: 'checkbox', name: 'not_flag', label: 'NOT (show only when the tag is empty)' },
                    { type: 'checkbox', name: 'bold', label: 'Bold' },
                    { type: 'checkbox', name: 'italic', label: 'Italic' },
                    { type: 'checkbox', name: 'underline', label: 'Underline' },
                    { type: 'textbox', name: 'post_text', label: 'After text' }
                ],
                onsubmit: function (e) {
                    editor.insertContent(data_merge_build_if_statement(e.data));
                }
            });
        }
    });
}

/* ---------------------------------------
   Save selection as a Data Merge Include
---------------------------------------- */

function data_merge_get_csrf() {
    var m = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);
    return m ? m[1] : '';
}

function data_merge_add_save_include_button(editor, save_url) {
    editor.addButton('saveinclude', {
        text: 'Save include',
        tooltip: 'Save the selected content as a reusable data merge include',
        onclick: function () {
            var selection = editor.selection.getContent() || '';
            editor.windowManager.open({
                title: 'Save as Data Merge Include',
                width: 420,
                height: 200,
                body: [
                    { type: 'textbox', name: 'name', label: 'Name' },
                    { type: 'textbox', name: 'code', label: 'Code (a-z and _ only)' }
                ],
                onsubmit: function (e) {
                    var body = 'name=' + encodeURIComponent(e.data.name) +
                        '&code=' + encodeURIComponent(e.data.code) +
                        '&dm_string=' + encodeURIComponent(selection);
                    fetch(save_url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                            'X-CSRFToken': data_merge_get_csrf()
                        },
                        body: body,
                        credentials: 'same-origin'
                    }).then(function (r) { return r.json(); }).then(function (d) {
                        if (d.ok) {
                            editor.insertContent('[{ ' + d.code + ' }]');
                        } else {
                            editor.windowManager.alert(d.error || 'Could not save include.');
                        }
                    }).catch(function () {
                        editor.windowManager.alert('Could not save include.');
                    });
                }
            });
        }
    });
}

/* ---------------------------------------
   Kick everything off
---------------------------------------- */

setTimeout(function () {
    init_tiny_when_visible_{{ widget.attrs.id }}();
}, 0);
</script>
