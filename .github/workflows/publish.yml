name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) - there is NO API token stored anywhere;
# PyPI verifies this workflow's identity directly. See README/below for the
# one-time PyPI-side setup.
on:
  release:
    types: [published]
  # Manual trigger: publishes whatever version is in pyproject.toml from the
  # chosen ref. Use when a release event can't be used (e.g. the tag predates
  # this workflow). The tag/version guard below is skipped for manual runs.
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Guard: the release tag (e.g. v1.4.2) must match pyproject version, so we
      # can never publish a version that disagrees with the source tree.
      - name: Verify tag matches pyproject version
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PROJ=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Release tag: $TAG   pyproject version: $PROJ"
          if [ "$TAG" != "$PROJ" ]; then
            echo "::error::Release tag ($TAG) does not match pyproject version ($PROJ). Bump pyproject.toml before releasing."
            exit 1
          fi

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check package metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload dist as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # A dedicated environment lets you add release protections (required
    # reviewers etc.) later. The name must match the PyPI trusted-publisher
    # config (see setup notes).
    environment: pypi
    permissions:
      id-token: write   # REQUIRED for trusted publishing (OIDC); no token needed
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
